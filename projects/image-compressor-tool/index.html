<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Compressor · Browser tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="back-portfolio" href="../../index.html#projects">← Portfolio</a>

  <div class="page">
    <header class="head">
      <h1>Image compressor</h1>
      <p>Resize and export JPEG in the browser. Demo site · HTML, CSS, JavaScript.</p>
    </header>

    <div class="panel">
      <label class="drop">
        <input type="file" id="file" accept="image/*" />
        <span id="drop-label">Choose image (JPEG / PNG / WebP)</span>
      </label>

      <div class="controls">
        <label>Quality (<span id="q-val">82</span>%)
          <input type="range" id="quality" min="40" max="95" value="82" />
        </label>
        <label>Max width (px)
          <input type="number" id="maxw" min="320" max="4096" step="80" value="1280" />
        </label>
      </div>

      <p id="err" class="err" hidden></p>

      <div id="result" class="result hidden">
        <div>
          <h2>Original</h2>
          <p class="meta" id="meta-o"></p>
          <img id="img-o" alt="Original" />
        </div>
        <div>
          <h2>Compressed (JPEG)</h2>
          <p class="meta" id="meta-c"></p>
          <img id="img-c" alt="Compressed" />
          <a id="dl" class="dl" download="compressed.jpg">Download JPEG</a>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
